name: Release

# Se dispara al crear un tag de versión, por ejemplo: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # necesario para crear el Release

jobs:
  build-images:
    name: Construir imágenes Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen del backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: sicad-backend:${{ github.ref_name }}

      - name: Construir imagen del frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: sicad-frontend:${{ github.ref_name }}

  release:
    name: Publicar Release en GitHub
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: SICAD ${{ github.ref_name }}
          body: |
            ## SICAD ${{ github.ref_name }}

            Release automático generado por el pipeline de CI/CD.

            Las imágenes Docker `sicad-backend` y `sicad-frontend` se construyeron
            correctamente como parte de este release.
